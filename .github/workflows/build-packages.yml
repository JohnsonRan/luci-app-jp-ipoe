name: Build OpenWrt packages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: OpenWrt ${{ matrix.openwrt }} packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - openwrt: "24.10"
            target: x86/64
            target_label: x86-64
            package_ext: ipk
          - openwrt: "24.10"
            target: armsr/armv8
            target_label: arm64
            package_ext: ipk
          - openwrt: "25.12"
            target: x86/64
            target_label: x86-64
            package_ext: apk
          - openwrt: "25.12"
            target: armsr/armv8
            target_label: arm64
            package_ext: apk

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl file gawk gettext git libncurses-dev libssl-dev python3 rsync unzip wget xz-utils zstd

      - name: Resolve latest OpenWrt release
        id: release
        env:
          OPENWRT_SERIES: ${{ matrix.openwrt }}
        run: |
          set -eu

          release="$(
            curl -fsSL https://downloads.openwrt.org/releases/ |
              grep -Eo "href=\"${OPENWRT_SERIES}\.[0-9]+/\"" |
              sed -E 's/^href="([^/]+)\/"$/\1/' |
              sort -V |
              tail -n 1
          )"

          if [ -z "$release" ]; then
            echo "No OpenWrt release found for ${OPENWRT_SERIES}.x" >&2
            exit 1
          fi

          echo "version=$release" >> "$GITHUB_OUTPUT"

      - name: Download OpenWrt SDK
        env:
          OPENWRT_VERSION: ${{ steps.release.outputs.version }}
          OPENWRT_TARGET: ${{ matrix.target }}
        run: |
          set -eu

          target_dir="${OPENWRT_TARGET}"
          target_name="$(printf '%s' "$OPENWRT_TARGET" | tr '/' '-')"
          base_url="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${target_dir}"

          sdk_file="$(
            curl -fsSL "${base_url}/" |
              grep -Eo "openwrt-sdk-${OPENWRT_VERSION}-${target_name}[^\"']+Linux-x86_64\.tar\.(zst|xz)" |
              head -n 1
          )"

          if [ -z "$sdk_file" ]; then
            echo "No SDK archive found at ${base_url}" >&2
            exit 1
          fi

          curl -fL "${base_url}/${sdk_file}" -o "$sdk_file"
          tar -xf "$sdk_file"
          sdk_dir="$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*' -print -quit)"

          if [ -z "$sdk_dir" ]; then
            echo "SDK archive did not extract an openwrt-sdk directory" >&2
            exit 1
          fi

          mv "$sdk_dir" sdk

      - name: Prepare package feed
        run: |
          set -eu

          mkdir -p sdk/package/luci-app-jp-ipoe
          rsync -a --exclude=.git --exclude=.github --exclude=sdk --exclude=dist ./ sdk/package/luci-app-jp-ipoe/

      - name: Update feeds
        working-directory: sdk
        run: |
          set -eu

          ./scripts/feeds update luci packages
          ./scripts/feeds install -p luci luci-base
          ./scripts/feeds install -p packages map

      - name: Build package
        working-directory: sdk
        run: |
          set -eu

          echo "CONFIG_PACKAGE_luci-app-jp-ipoe=m" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-jp-ipoe-zh-cn=m" >> .config
          make defconfig
          make package/luci-app-jp-ipoe/compile V=s

      - name: Collect packages
        env:
          OPENWRT_VERSION: ${{ steps.release.outputs.version }}
          TARGET_LABEL: ${{ matrix.target_label }}
          PACKAGE_EXT: ${{ matrix.package_ext }}
        run: |
          set -eu

          mkdir -p dist
          find sdk/bin -type f \( -name "luci-app-jp-ipoe*.${PACKAGE_EXT}" -o -name "luci-i18n-jp-ipoe-*.${PACKAGE_EXT}" \) | while read -r package; do
            name="$(basename "$package")"
            cp "$package" "dist/${name%.${PACKAGE_EXT}}-openwrt-${OPENWRT_VERSION}-${TARGET_LABEL}.${PACKAGE_EXT}"
          done

          test -n "$(find dist -type f -name "*.${PACKAGE_EXT}" -print -quit)"

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: luci-app-jp-ipoe-openwrt-${{ steps.release.outputs.version }}-${{ matrix.target_label }}
          path: |
            dist/*.${{ matrix.package_ext }}
          if-no-files-found: error

  release:
    name: Release packages
    needs: build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'nightly' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Nightly build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          make_latest: ${{ startsWith(github.ref, 'refs/tags/') }}
          files: |
            release-assets/**/*.ipk
            release-assets/**/*.apk
